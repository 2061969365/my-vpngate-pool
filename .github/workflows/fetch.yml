name: Fetch VPN Gate Nodes Daily

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest Nodes
        run: |
          curl -s -S --connect-timeout 10 -m 30 "https://www.vpngate.net/api/iphone/" > nodes.txt
          if [ -s nodes.txt ]; then
            echo "Fetch successful!"
          else
            echo "Fetch failed or empty file!" && exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nodes.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update nodes: $(date -u)" && git push)
